name: CI - Docker Build, Scan and Push

on:
  workflow_run:
    workflows: ["CI - Code Quality and SCA"]
    types:
      - completed

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker Image Tag (format: vX.X.X)"
        required: true

jobs:
  docker:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
# ---------------- VALIDATE IMAGE TAG ----------------
      - name: Validate Image Tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"

          if [ -z "$TAG" ]; then
            echo "Image tag is required"
            exit 1
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format. Use vX.X.X (e.g., v1.1.1)"
            exit 1
          fi

          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

# ---------------- CHECKOUT ----------------
      - name: Checkout Code
        uses: actions/checkout@v4

# ---------------- BUILD DOCKER IMAGE ----------------
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/payment-microservice:${{ env.IMAGE_TAG }} .

# ---------------- TRIVY IMAGE SCAN ----------------
      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/payment-microservice:${{ env.IMAGE_TAG }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

# ---------------- DOCKER LOGIN ----------------
      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
          -u "${{ secrets.DOCKERHUB_USERNAME }}" \
          --password-stdin

# ---------------- PUSH IMAGE ----------------
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/payment-microservice:${{ env.IMAGE_TAG }}

# ---------------- FAILURE EMAIL ----------------
      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Docker Pipeline Failed: ${{ github.repository }}"
          body: |
            Docker Pipeline Failed

            Repository: ${{ github.repository }}

            Failed Stage:
            - Tag Validation or Trivy Scan or Docker Push

            Logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          to: ${{ secrets.RECIVER_EMAIL }}
          from: DevOps Alert

# ---------------- SUCCESS EMAIL ----------------
      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Docker Pipeline Success: ${{ github.repository }}"
          body: |
            Docker Pipeline Passed

            Image built, scanned, and pushed successfully

            Image:
            ${{ secrets.DOCKERHUB_USERNAME }}/payment-microservice:${{ env.IMAGE_TAG }}

          to: ${{ secrets.RECIVER_EMAIL }}
          from: DevOps Alert