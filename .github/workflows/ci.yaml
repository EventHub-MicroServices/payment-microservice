name: SonarQube Scan, Snyk SCA & Trivy Image Scan

on:
  push:
    branches:
      - actions
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    runs-on: ubuntu-latest

    steps:
# ---------------- CHECKOUT ----------------
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

# ---------------- SONARQUBE (SAST) ----------------
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=payment-microservice
            -Dsonar.sources=.

      - name: SonarQube Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

# ---------------- SETUP PYTHON ----------------
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

# ---------------- INSTALL DEPENDENCIES ----------------
      - name: Install dependencies
        run: |
          cd src
          pip install -r requirements.txt

# ---------------- SNYK SCA ----------------
      - name: Run Snyk Scan (SCA)
        run: |
          npm install -g snyk
          cd src
          snyk auth $SNYK_TOKEN
          snyk test --file=requirements.txt --severity-threshold=medium
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

# ---------------- BUILD DOCKER IMAGE ----------------
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/payment-microservice:latest .

# ---------------- TRIVY IMAGE SCAN ----------------
      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/payment-microservice:latest
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1

# ---------------- DOCKER LOGIN ----------------
      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
          -u "${{ secrets.DOCKERHUB_USERNAME }}" \
          --password-stdin

# ---------------- PUSH IMAGE ----------------
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/payment-microservice:latest

# ---------------- FAILURE EMAIL ----------------
      - name: Send Notification on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Pipeline Failed: ${{ github.repository }}"
          body: |
            DevSecOps Pipeline Failed

            Project: ${{ github.repository }}

            Failed Stage:
            - SonarQube OR
            - Snyk SCA OR
            - Trivy Image Scan

            Logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          to: ${{ secrets.RECIVER_EMAIL }}
          from: DevOps Alert

# ---------------- SUCCESS EMAIL ----------------
      - name: Send Notification on Success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Pipeline Success: ${{ github.repository }}"
          body: |
            DevSecOps Pipeline Passed

            SonarQube Quality Gate passed
            Snyk SCA Scan passed
            Trivy Image Scan passed

            Image built, scanned, and pushed successfully

            View Sonar Report:
            ${{ secrets.SONAR_HOST_URL }}/dashboard?id=payment-microservice

          to: ${{ secrets.RECIVER_EMAIL }}
          from: DevOps Alert